[package]
name = "rustitude-gluex"
version = "0.2.0"
edition = "2021"
authors = ["Nathaniel Dene Hoffman <dene@cmu.edu>"]
description = "GlueX Amplitudes for Rustitude"
repository = "https://github.com/denehoffman/rustitude/tree/main/crates/rustitude-gluex"
homepage = "https://github.com/denehoffman/rustitude/tree/main/crates/rustitude-gluex"
license = "BSD-3-Clause"
readme = "README.md"

[dependencies]
factorial = "0.4.0"
nalgebra = { version = "0.32.5", features = ["serde"] }
num-complex = "0.4.5"
pyo3 = "0.21.2"
rayon = "1.10.0"
rustitude-core = { version = "1.0.0", path = "../rustitude-core" }
serde = { version = "1.0.202", features = ["derive", "alloc", "rc"] }
sphrs = "0.2.2"
typetag = "0.2.16"
